name: Scrape UCSD schedules (TSS)
run-name: Scrape UCSD schedules (${{ format('{0}{1}', inputs.quarter, inputs.year) }}) from TSS

on:
  workflow_dispatch:
    inputs:
      year:
        description: Last two digits of the year
        required: true
        type: string
      quarter:
        description: Quarter
        required: true
        type: choice
        options:
          - FA
          - WI
          - SP
          - SA

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape TSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Scrape sections
        run: node tss/index.ts ${{ inputs.quarter }}${{ inputs.year }}
      - name: Write classrooms data
        run: node tss/coursesToFile.ts ${{ inputs.quarter }}${{ inputs.year }}
      - name: Move files
        run: |
          mkdir tss_out
          mv classrooms-*.txt tss_out
          ls -al tss_out
      - name: Upload scraped data
        uses: actions/upload-artifact@v7
        with:
          name: data
          path: ./tss_out/
          if-no-files-found: error
  upload:
    name: Upload scraped data to gh-pages
    runs-on: ubuntu-latest
    needs: scrape
    concurrency:
      group: gh-pages-upload
    steps:
      - uses: actions/checkout@v7
        with:
          ref: gh-pages
      - uses: actions/download-artifact@v8
        with:
          name: data
          path: ~/data/
      - name: Push scraped data to gh-pages
        env:
          TERM: ${{ inputs.quarter }}${{ inputs.year }}
        run: |
          cp -v ~/data/* ./data/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./data/
          git commit --allow-empty -m "Scrape $TERM (TSS)"
          git push
